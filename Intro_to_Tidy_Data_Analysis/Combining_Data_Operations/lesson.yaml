  Output: " "

- Class: text
  Output: "In this lesson you learned how to combine data operations using nesting, intermediate variables, and pipes -- and why pipes are the clearest approach. In the next lessons you will learn how to work with files on disk -- reading real data into R and writing results out -- and then how to save and organise your pipelines into reusable R scripts."
