  Output: " "


## CHANGE DATA: MUTATE
- Class: text
  Output: >-
    MUTATE: mutate() adds new columns, often derived from the values already in the dataframe.
    The syntax is:
    mutate(dataframe, new_col = expression).

- Class: text
  Output: >-
    The expression for the new column can be any valid R expression;
    to add just a single value to all rows, you can use a constant like 42 or "hello":
    `penguins |> mutate(answer = 42)` adds a new column called answer with the value 42 for all rows.

- Class: text
  Output: >-
    More interestingly, the expression can use existing columns to compute new values.
    For example, `penguins |> mutate(new_body_mass = body_mass - 10)`
    adds a new column called new_body_mass with the value of body_mass minus 10 for all rows.

- Class: cmd_question
  Output: >-
    Add a column called body_mass_kg that converts body_mass from grams to
    kilograms (divide by 1000).
  CorrectAnswer: penguins |> mutate(body_mass_kg = body_mass / 1000)
  AnswerTests: any_of_exprs('penguins |> mutate(body_mass_kg = body_mass / 1000)', 'penguins |> mutate(body_mass_kg = body_mass/1000)', 'penguins |> mutate(body_mass_kg=body_mass/1000)', 'penguins |> mutate(body_mass_kg=body_mass / 1000)')
  Hint: "Type: penguins |> mutate(body_mass_kg = body_mass / 1000)"

- Class: text
  Output: " "

- Class: text
  Output: >-
    Now use mutate() in a script to answer a question about body mass in
    kilograms, which is more intuitive than grams for many readers.

- Class: script
  Output: >-
    The script asks: what is the average body mass in kilograms per species
    and sex? Fill in the mutate() call to add a body_mass_kg column
    (body_mass divided by 1000).
    Save the file (Ctrl+S / Cmd+S), then type submit().
  AnswerTests: "TRUE"
  Hint: >-
    Fill in: mutate(body_mass_kg = body_mass / 1000).
    Save, then type submit().
  Script: script_mutate.R

- Class: text
  Output: " "

- Class: text
  Output: >-
    mutate() does not change the original dataset -- it returns a new
    dataframe with the extra column. To keep the result, you assign it to a
    variable with <-.


## COMBINE
- Class: text
  Output: >-
    These three functions -- select(), filter(), and mutate() -- combine
    naturally with each other and with group_by() and summarise() in a pipe.
    Each step narrows, reshapes, or enriches the data, and the result flows
    into the next step.

- Class: text
  Output: >-
    Here is an example that chains all three:
    penguins |> filter(sex == 'female') |> mutate(body_mass_kg = body_mass / 1000) |> select(-body_mass).
    This pipeline first filters the data to keep only female penguins,
    then adds a new column with body mass in kg,
    and finally drops the original body_mass (in grams) column.

- Class: cmd_question
  Output: >-
    Now try it yourself. Starting from penguins, filter for Chinstrap penguins,
    then select only species and body_mass, then add a body_mass_kg column.
    Save the result to chinstrap_mass.
  CorrectAnswer: chinstrap_mass <- penguins |> filter(species == 'Chinstrap') |> select(species, body_mass) |> mutate(body_mass_kg = body_mass / 1000)
  AnswerTests: val_equals(penguins |> filter(species == 'Chinstrap') |> select(species, body_mass) |> mutate(body_mass_kg = body_mass / 1000))
  Hint: >-
    Try: chinstrap_mass <- penguins |> filter(species == 'Chinstrap') |>
    select(species, body_mass) |> mutate(body_mass_kg = body_mass / 1000)

- Class: text
  Output: " "

- Class: text
  Output: >-
    You can also use filter() and select() together with group_by() and
    summarise() in longer pipelines. The order matters: filter() first to
    reduce rows, then group_by() and summarise() to aggregate.

- Class: cmd_question
  Output: >-
    Compute the average body mass of female penguins, grouped by species.
    Save the result to female_mass_by_species.
  CorrectAnswer: female_mass_by_species <- penguins |> filter(sex == 'female') |> group_by(species) |> summarise(avg_mass = mean(body_mass, na.rm = TRUE))
  AnswerTests: val_equals(penguins |> filter(sex == 'female') |> group_by(species) |> summarise(avg_mass = mean(body_mass, na.rm = TRUE)))
  Hint: >-
    Filter for sex == 'female' first, then group_by(species), then
    summarise(avg_mass = mean(body_mass, na.rm = TRUE)).

- Class: text
  Output: " "

- Class: text
  Output: >-
    Now put it all together. The next script uses filter(), mutate(), and
    select() together with group_by() and summarise() to answer a question
    that requires all of them.

