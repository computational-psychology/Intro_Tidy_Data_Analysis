- Class: text
  Output: >-
    In this lesson you learned the three core tidyverse transformation functions:
    select() to keep or drop columns by name,
    filter() to keep rows matching a condition,
    and mutate() to add new columns derived from existing ones.
    You practiced combining them with each other
    and with group_by() and summarise() in a single pipe.
