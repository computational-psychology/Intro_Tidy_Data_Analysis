## SUBSETTING: FILTER & SELECT
- Class: text
  Output: >-
    So far your pipelines have always used the full penguins dataset.
    In real analyses you often need to focus on a subset of the data:
    either just the observations you care about, or only the variables you care about.
    The tidyverse (specifically dplyr) provides two functions for this:
    select() for variables, and filter() for observations.


- Class: text
  Output: >-
    SELECT: select() keeps only the COLUMNS you name.
    This is useful when a dataset has many columns and you only need a few.
    The syntax is: select(dataframe, col1, col2, ...),
    for example: `penguins |> select(body_mass)`.

- Class: cmd_question
  Output: >-
    Try keeping only the species, body_mass, and sex columns.
  CorrectAnswer: penguins |> select(species, body_mass, sex)
  AnswerTests: any_of_exprs('penguins |> select(species, body_mass, sex)', 'penguins |> select(species,body_mass,sex)')
  Hint: "Type: penguins |> select(species, body_mass, sex)"

- Class: text
  Output: " "

- Class: text
  Output: "You can also drop columns by prefixing their name with -: select(-col1)."

- Class: cmd_question
  Output: >-
    Now drop just the year column using select() with a minus sign.
  CorrectAnswer: penguins |> select(-year)
  AnswerTests: expr_identical_to('penguins |> select(-year)')
  Hint: "Type: penguins |> select(-year)"

- Class: text
  Output: " "

- Class: text
  Output: >-
    Now use select() in a script. This time, select() is used to narrow
    the dataset to only the columns needed before grouping and summarising.

- Class: script
  Output: >-
    The script asks: what is the average body mass per species and island?
    Fill in the select() call to keep only the species, island, and body_mass
    columns before the group_by() and summarise().
    Save the file (Ctrl+S / Cmd+S), then type submit().
  AnswerTests: "TRUE"
  Hint: >-
    Fill in: select(species, island, body_mass).
    Save, then type submit().
  Script: script_select.R

- Class: text
  Output: " "

- Class: text
  Output: >-
    To filter OBSERVATIONS (rows) instead of variables (columns), we use filter() instead of select().
    This is slightly more complicated, because we cannot just _name_ the observations we want to keep.
    Instead, we specify some CONDITION that the observations must satisfy to be kept.
    For example, if we want to keep only the Adelie penguins,
    we can use the condition `species == 'Adelie'` in filter().

- Class: text
  Output: >-
    filter() keeps only the OBSERVATIONS that satisfy a CONDITION.
    The syntax is: filter(data_frame, condition).
    NOTE: we filter the observations we want to KEEP, not the ones to drop.

- Class: text
  Output: >-
    A condition, or conditional expression, is a logical statement that evaluates to TRUE or FALSE.
    Most often, a conditional expression uses some COMPARISON OPERATOR,
    like == (equal), != (not equal), > (greater than), < (less than), >= (at least), <= (at most).

- Class: text
  Output: >-
    For example, `5 == 5` is TRUE, while `5 > 10` is FALSE; `x <- 5; x != 3` is TRUE, while `x < 3` is FALSE.

# - Class: text
#   Output: >-
#     Conditions can be combined with & (AND) and | (OR), which results in a single TRUE or FALSE value.
#     For example, `x > 0 & x < 10` is TRUE if x is between 0 and 10, while `x < 0 | x > 10` is TRUE if x is outside that range.

- Class: text
  Output: >-
    When you use a conditional expression in filter(), it keeps only the rows where the condition is TRUE.
    For example, `filter(penguins, species == 'Adelie')` keeps only the rows where the species column is 'Adelie'.

- Class: cmd_question
  Output: >-
    Use filter() in a pipe to find all Adelie penguins.
  CorrectAnswer: penguins |> filter(species == 'Adelie')
  AnswerTests: any_of_exprs("penguins |> filter(species == 'Adelie')", 'penguins |> filter(species == "Adelie")', "penguins |> filter(species=='Adelie')", 'penguins |> filter(species=="Adelie")')
  Hint: "Type: penguins |> filter(species == 'Adelie')"

- Class: text
  Output: " "

- Class: cmd_question
  Output: >-
    Now filter for penguins whose body mass is more than 5000 grams.
  CorrectAnswer: penguins |> filter(body_mass > 5000)
  AnswerTests: any_of_exprs('penguins |> filter(body_mass > 5000)', 'penguins |> filter(body_mass>5000)')
  Hint: "Type: penguins |> filter(body_mass > 5000)"

- Class: text
  Output: " "

- Class: text
  Output: >-
    Filter can take multiple conditions, separated by commas.
    Multiple conditions are combined with AND logic -- all of them must be true for a row to be kept.

- Class: mult_question
  Output: >-
    Which filter() call would keep only female Gentoo penguins?
  AnswerChoices: "filter(species = 'Gentoo' and sex = 'female');filter(species == 'Gentoo' or sex == 'female');filter(species == 'Gentoo', sex == 'female');filter(species, sex == 'Gentoo','female')"
  CorrectAnswer: "filter(species == 'Gentoo', sex == 'female')"
  AnswerTests: omnitest(correctVal="filter(species == 'Gentoo', sex == 'female')")
  Hint: The full conditions are separated by a comma.

- Class: text
  Output: " "

- Class: text
  Output: >-
    Sometimes we need a combined expression for multiple conditions on the same value,
    for instance to keep only penguins that are within a certain body mass range.
    In that case, we can use & (AND) and | (OR) to combine conditions into a single expression.
    For example, `filter(penguins, body_mass > 4000 & body_mass < 5000)`
    keeps only penguins with body mass between 4000 and 5000 grams.

- Class: text
  Output: >-
    Now let's use filter() in a script to answer a real question.
    The script has a skeleton pipeline -- fill in the filter() call,
    save the file, then type submit().

- Class: script
  Output: >-
    The script asks: do female Gentoo penguins differ in average body mass
    across islands? The pipeline structure is already there -- fill in the
    filter() call to keep only female Gentoo penguins.
    Save the file (Ctrl+S / Cmd+S), then type submit().
  AnswerTests: "TRUE"
  Hint: >-
    Fill in: filter(species == 'Gentoo' & sex == 'female').
    Save, then type submit().
  Script: script_filter.R

