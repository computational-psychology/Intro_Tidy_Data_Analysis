  Output: Use distinct() to find out which species appear in the penguins dataset.
  CorrectAnswer: distinct(penguins, species)
  AnswerTests: expr_identical_to('distinct(penguins, species)')
  Hint: Try distinct(penguins, species)

- Class: text
  Output: " "

