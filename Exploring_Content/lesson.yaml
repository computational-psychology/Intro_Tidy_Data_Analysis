  CorrectAnswer: distinct(penguins, year)
  AnswerTests: expr_identical_to('distinct(penguins, year)')
  Hint: Try distinct(penguins, year)

- Class: text
  Output: " "

- Class: mult_question
  Output: "Before running any code: what distinct values would you expect to find in the sex column?"
  AnswerChoices: male and female;just male;boy, and girl; none
  CorrectAnswer: male and female
  AnswerTests: omnitest(correctVal='male and female')
