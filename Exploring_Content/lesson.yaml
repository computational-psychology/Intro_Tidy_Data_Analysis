  Output: How many islands does the data cover?
  AnswerChoices: 3;2;4;5
  CorrectAnswer: 3
  AnswerTests: omnitest(correctVal='3')
  Hint: Count the distinct values in the output.

- Class: text
  Output: Three islands -- Biscoe, Dream, and Torgersen. Now let's see which species of penguins were observed.

