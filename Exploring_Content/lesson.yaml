- Class: text
  Output: " "

- Class: text
  Output: "Alongside male and female, there is a third value: NA. This is R's representation of a MISSING VALUE -- a value that should be there (there is an observation, there is a variable), but for which no actual value was recorded. For some penguins, sex was simply not observed or not recorded."

- Class: text
  Output: "NA stands for Not Available. It is a special value in R, not a number or a text label. Because we don't know what a missing value actually is, NA is not equal to anything -- not even to another NA. So NA == NA does not return TRUE; it returns NA. Similarly, most calculations involving NA will also return NA by default. This will matter when we start asking questions about the data."

- Class: cmd_question
  Output: Now try distinct() on a numerical variable with many different values -- body_mass. Think first about what you would expect the output to look like. Use distinct() on the body_mass column of penguins.
  CorrectAnswer: distinct(penguins, body_mass)
  AnswerTests: expr_identical_to('distinct(penguins, body_mass)')
  Hint: Try distinct(penguins, body_mass)

- Class: text
  Output: " "

- Class: text
  Output: As you can see, distinct() on a numeric variable like body_mass produces a lot of output. This is because a numeric variable can take on many distinct values -- in this case, any integer! With this many distinct values, the output is not very informative. distinct() works best for categorical variables or numeric ones with only a few possible values (like year).

- Class: text
  Output: "Obviously, we'd still like have some idea of the range of values in body_mass -- but distinct() is not the right tool for that. We will learn better ways to summarise numeric variables in the next lesson."

- Class: text
  Output: "For now you have a solid first picture of this dataset: its size, what each variable contains, its data types, and the scope of the data (which species, islands, and years are represented). Let's put that together."

- Class: text_question
  Output: "Write a short (2-3 sentence) description of the penguins dataset. Include: what is being measured (unit of observation), how many observations, which variables / what information is recorded, and the scope (which species? which islands? which years?). Try to describe the *content*, not just the names of the variables."
  CorrectAnswer: This dataset contains measurements on 344 individual penguins, collected on three islands (Biscoe, Dream, Torgersen) in the Palmer Archipelago, Antarctica, over the years 2007, 2008, and 2009. The penguins belong to three species (Adelie, Chinstrap, Gentoo). For each penguin, physical measurements are recorded such as body mass, flipper length, bill length, bill depth, and sex.
  AnswerTests: TRUE
  Hint: Think about who or what is observed, how many, where, when, and what is measured.
- Class: text
  Output: "Here is one way to describe it: This dataset contains measurements on 344 individual penguins, collected on three islands (Biscoe, Dream, and Torgersen) in the Palmer Archipelago, Antarctica, over the years 2007, 2008, and 2009. The penguins belong to three species: Adelie, Chinstrap, and Gentoo. For each penguin, physical measurements are recorded -- body mass, flipper length, bill length, and bill depth -- as well as its sex."

- Class: text
  Output: "In this lesson you explored the actual content of the penguins dataset: what real observations look like, what data type each variable has, and which values appear in the categorical variables. This kind of exploration is always the first thing you should do with a new dataset. If you don't know what the data looks like, you can't ask meaningful questions of it -- and you won't be able to tell whether something that looks wrong later was already in the data, or introduced by your own code."
