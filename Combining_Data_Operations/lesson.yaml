- Class: text
  Output: "Taken together, we did:
  grouped_penguins <- group_by(penguins, species, sex);\n
  summarise(grouped_penguins, avg_body_mass = mean(body_mass, na.rm = TRUE))"

- Class: text
  Output: "This is equivalent to the nested version summarise(group_by(penguins, species, sex), avg_body_mass = mean(body_mass, na.rm = TRUE))
  -- but now the order of operations matches the order of reading, and it's easier to follow."


