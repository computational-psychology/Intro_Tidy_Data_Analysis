- Class: text
  Output: "This is a perfectly valid way to combine operations too:
  conduct each operation in order, assign the result to a variable, then use that variable as the input to the next operation."

- Class: text
  Output: "But it requires inventing a name (grouped_penguins) for a dataframe we probably only need once. If you do this for every intermediate step, you quickly fill up your environment with single-use variables."

- Class: mult_question
  Output: "Here is a slightly messier example of the same pattern:\n
    df <- penguins;\n
    df2 <- filter(df, body_mass > 3500);\n
    df3 <- group_by(df2, island);\n
    result <- summarise(df3, avg_bill = mean(bill_len, na.rm = TRUE));\n
  Which variable contains ALL penguins with a body mass over 3500g, from all islands?"
  AnswerChoices: df2;df3;result;df
  CorrectAnswer: df2
  AnswerTests: omnitest(correctVal='df2')
  Hint: "df2 <- filter(df, body_mass > 3500) keeps every observation where body_mass > 3500, in the original dataframe (includes all islands).
  The next step (df3) groups that filtered data -- it does not filter it."


- Class: text
  Output: " "

- Class: text
  Output: "This is a common pattern in programming -- you create intermediate variables to hold the results of each step, then use those variables as the input to the next step.
  In this example we used some spectacularly not-useful varaible names (df, df2, df3) to make the point.
  If instead we had used more descriptive names (penguins, heavy_penguins, heavy_penguins_by_island, avg_bill_by_island), it would be easier to read.
  Readible variable names are a MUST in data analysis, to keep things clear -- for other and for yourself!"

- Class: text
  Output: "But even with good variable names, it still clutters your environment with single-use variables. Do we really need a 'heavy_penguins_by_island' variable, that we only probably only use once?
  Wouldn't it be nicer if we could just use that dataframe directly -- without assigning it to a name -- but also without nesting it inside the next operation?"

# BASIC PIPES
- Class: text
  Output: "The correct approach to this is the PIPE OPERATOR: |>.
  The pipe takes the RESULT of the LEFT SIDE and passes it as the FIRST ARGUMENT to the RIGHT SIDE. So 'df |> some_function()' is exactly equivalent to 'some_function(df)'."

- Class: mult_question
  Output: "What should penguins |> nrow() produce?"
  AnswerChoices: The number of observations (344);An error -- nrow does not take a pipe;The number of variables (8);A grouped dataframe
  CorrectAnswer: The number of observations (344)
  AnswerTests: omnitest(correctVal='The number of observations (344)')
  Hint: "penguins |> nrow() is equivalent to nrow(penguins)."

- Class: text
  Output: " "

- Class: cmd_question
  Output: "Try it: run penguins |> nrow() to confirm."
  CorrectAnswer: penguins |> nrow()
  AnswerTests: expr_identical_to('penguins |> nrow()')
  Hint: "Type penguins |> nrow() and hit enter."

- Class: text
  Output: " "

- Class: mult_question
  Output: "In a normal summarise() call you write: summarise(penguins, avg_mass = mean(body_mass, na.rm = TRUE)). When you rewrite this using the pipe as: penguins |> summarise(...), which argument from the original call is no longer needed inside the parentheses?"
  AnswerChoices: penguins;avg_mass;mean(body_mass, na.rm = TRUE);na.rm = TRUE
  CorrectAnswer: penguins
  AnswerTests: omnitest(correctVal='penguins')
  Hint: "The pipe passes its left-hand side as the FIRST argument to the function on the right. In summarise(penguins, ...), penguins is that first argument -- so the pipe replaces it."

