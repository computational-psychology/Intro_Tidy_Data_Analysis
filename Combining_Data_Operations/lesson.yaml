- Class: text
  Output: "In the previous lesson, we calculated the average body mass of some penguins, specifically per group and sex.
  To do this, we ran summarise(group_by(penguins, species, sex), avg_body_mass = mean(body_mass, na.rm = TRUE)).
  That is TWO data operations combined: first group_by(), then summarise()."

- Class: text
  Output: "This is the core of data analysis: combining elementary data operations to get clearer, more specific answers.
  Each individual operation -- grouping, summarising, filtering, mutating -- is simple on its own.
  The power comes from combining them."

# NESTING
- Class: text
  Output: "Here we used one way of combining opeations -- NESTING: putting one call inside another.
  In summarise(group_by(penguins, species), ...), two operations are combined by nesting the group_by() operations INSIDE the summarise() call."

- Class: text
  Output: "Nesting is a perfectly valid way to combine opeations, but it can be heard to read."

- Class: mult_question
  Output: "In the expression summarise(group_by(penguins, species), avg_body_mass = mean(body_mass, na.rm = TRUE)), which operation runs first?"
  AnswerChoices: group_by();summarise();mean();They run simultaneously
  CorrectAnswer: group_by()
  AnswerTests: omnitest(correctVal='group_by()')
  Hint: R evaluates function arguments before the function itself -- so the argument to summarise() (which is group_by(...)) runs first.

- Class: text
  Output: " "

- Class: text
  Output: "To read this, you have to start from the INSIDE and work outward
  -- group_by runs first, then summarise.
  Nesting works fine for two operations.
  But with three or more it becomes hard to read -- you have to trace deeply nested parentheses,
  and the order of operations is the reverse of reading order."

- Class: mult_question
  Output: "Consider this more deeply nested expression: filter(summarise(group_by(penguins, species), avg_mass = mean(body_mass, na.rm = TRUE)), avg_mass > 4000). Which operation runs LAST?"
  AnswerChoices: group_by();summarise();filter();mean();They all run simultaneously
  CorrectAnswer: filter()
  AnswerTests: omnitest(correctVal='filter()')
  Hint: "Start at the innermost pair of parentheses and work outward: group_by() is deepest, so it runs first -- then summarise(), then filter()."

- Class: text
  Output: " "

- Class: text
  Output: "Even with just 4 operations, nesting becomes very hard to read.
  So, how can we combine multiple operations without nesting instead?"

# INTERMEDIATE VARIABLES
- Class: text
  Output: "An alternative is to ASSIGN function outputs to a PROGRAM VARIABLE.
  A program variable is just a name that refers to a value
  -- like how 'penguins' refers to the dataframe containing penguins.
  We assign to a (new) variable using the ASSIGNMENT OPERATOR <-: variable_name <- some_expression.
  Note that the variable name has no quotes around it;
  it's not a string of literal text, it's a name that refers to a value."

- Class: mult_question
  Output: "After running this code: species_summary <- summarise(group_by(penguins, species), avg_mass = mean(body_mass, na.rm = TRUE)) -- which variable contains the summarised dataframe?"
  AnswerChoices: species_summary;penguins;avg_mass;group_by
  CorrectAnswer: species_summary
  AnswerTests: omnitest(correctVal='species_summary')
  Hint: "The assignment operator <- stores the result of the right-hand side into the name on the left-hand side."

- Class: mult_question
  Output: "After running that same line, which dataframe does the variable penguins contain?"
  AnswerChoices: The original full penguin dataset;The summarised result with one row per species;An empty dataframe -- it was overwritten;A grouped version of the data
  CorrectAnswer: The original full penguin dataset
  AnswerTests: omnitest(correctVal='The original full penguin dataset')
  Hint: "The assignment creates a NEW variable called species_summary. The name penguins is never touched, so it still refers to exactly what it did before."

- Class: cmd_question
  Output: "Group the penguins dataframe by species and sex, and save it to a variable 'grouped_penguins'."
  CorrectAnswer: grouped_penguins <- group_by(penguins, species, sex)
  AnswerTests: any_of_exprs('grouped_penguins <- group_by(penguins, species, sex)', 'grouped_penguins <- group_by(penguins, sex, species)')
  Hint: "Type grouped_penguins <- group_by(penguins, species, sex) and hit enter."

- Class: text
  Output: " "

- Class: mult_question
  Output: "What should the variable grouped_penguins contain at this point?"
  AnswerChoices: The penguins dataframe grouped by species and sex;A summary table with one row per species and sex;The original ungrouped penguins dataframe;Nothing -- the assignment printed nothing so nothing was saved
  CorrectAnswer: The penguins dataframe grouped by species and sex
  AnswerTests: omnitest(correctVal='The penguins dataframe grouped by species and sex')
  Hint: "grouped_penguins <- group_by(penguins, species, sex) stores the result of group_by() -- a grouped version of the full dataframe -- under that name."

- Class: text
  Output: " "

