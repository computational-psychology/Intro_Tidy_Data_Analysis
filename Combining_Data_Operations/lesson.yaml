# ASSIGN PIPE OUTPUT
- Class: text
  Output: "While we don't want to save intermediate results, we do often want to save the final result of a pipeline.
  This should work the same as with any other expression: we can assign the result of a pipeline to a variable using <-."
  
- Class: text
  Output: "However, assignment works from RIGHT to LEFT: variable_name <- some_expression. 
  So if we want to assign the result of a pipeline, the assignment operator needs to go to the LEFT of the result that we want to save.
  In this case of a pipeline, we want to save the result of the WHOLE pipeline
  -- meaning the assignment has to go before the whole pipeline:
  result_name <- data |> operation_1() |> operation_2().
  This way, the whole pipeline is treated as a single expression whose result is assigned to result_name."


- Class: cmd_question
  Output: "Save the average body mass by species and sex to a variable, called mass_by_species_sex"
  CorrectAnswer: mass_by_species_sex <- penguins |> group_by(species, sex) |> summarise(avg_body_mass = mean(body_mass, na.rm = TRUE))
  AnswerTests: val_equals(penguins |> group_by(species, sex) |> summarise(avg_body_mass = mean(body_mass, na.rm = TRUE)))
  Hint: "Try mass_by_species_sex <- penguins |> group_by(species, sex) |> summarise(avg_body_mass = mean(body_mass, na.rm = TRUE))"

