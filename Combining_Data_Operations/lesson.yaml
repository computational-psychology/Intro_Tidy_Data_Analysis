# CHAIN PIPES

- Class: text
  Output: "So far you practiced piping into summarise() directly.
  The same logic applies to group_by() --
  it takes a dataframe as its first argument and returns a dataframe,
  so it works just as naturally with the pipe."

- Class: mult_question
  Output: "What does penguins |> group_by(species) produce?"
  AnswerChoices: The penguins dataframe, grouped by species;A summary table with one row per species;Only the species column;An error -- group_by does not accept a pipe
  CorrectAnswer: The penguins dataframe, grouped by species
  AnswerTests: omnitest(correctVal='The penguins dataframe, grouped by species')
  Hint: "group_by() takes a dataframe and returns the same dataframe with grouping information attached. The pipe passes penguins as that first argument."

- Class: text
  Output: " "

- Class: cmd_question
  Output: "Try it: pipe penguins into group_by() to group by species."
  CorrectAnswer: penguins |> group_by(species)
  AnswerTests: expr_identical_to('penguins |> group_by(species)')
  Hint: "Type penguins |> group_by(species) and hit enter."

- Class: text
  Output: " "

- Class: text
  Output: "The pipe works so neatly with tidyverse functions because of a deliberate design choice:
  almost every tidyverse function takes a DATAFRAME as its FIRST argument, and RETURNS a dataframe as its result.
  group_by() takes a dataframe, returns a grouped dataframe.
  summarise() takes a dataframe, returns a summary dataframe."

- Class: text
  Output: "Because the pipe passes the left-hand result as the first argument on the right,
  and because tidyverse functions always take a dataframe first and return a dataframe,
  we can CHAIN them together into an analysis pipeline:
  penguins |> group_by(species) |> summarise(...).
  Each step receives the dataframe from the previous step, transforms it, and hands it on."


- Class: text
  Output: "Now let's think about how to rewrite the grouped summarise using pipes.
  You have all the pieces -- you just need to chain them together."

