  CorrectAnswer: penguins |> summarise(avg_mass = mean(avg_body_mass, na.rm = TRUE))
  AnswerTests: omnitest(correctVal='penguins |> summarise(avg_mass = mean(avg_body_mass, na.rm = TRUE))')
