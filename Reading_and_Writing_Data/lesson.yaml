- Class: text
  Output: >-
    In this lesson you learned how to save a dataframe to a CSV file with
    write_csv() and read one back with read_csv(). You saw how read_csv()
    guesses column types and that factors become character strings in the
    round-trip. You learned the data/ subfolder convention for keeping
    projects portable and self-contained.

- Class: text
  Output: >-
    Now, you have all the tools to do your own data analysis projects with your own data!
    You know how to organize a data science project with a project directory
    and a data/ subfolder,
    how to create scripts,
    and how to read and write data files with read_csv() and write_csv().
